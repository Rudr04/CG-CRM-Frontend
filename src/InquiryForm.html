<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; padding: 20px; overflow: visible; }

    .form-section { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); overflow: visible; }
    .section-title { font-size: 14px; font-weight: 600; color: #202124; margin-bottom: 16px; text-transform: uppercase; letter-spacing: .5px; }

    .form-row       { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; overflow: visible; }
    .form-row.full  { grid-template-columns: 1fr; }
    .form-row.tri   { grid-template-columns: 1fr 1fr 1fr; }
    .form-group     { display: flex; flex-direction: column; overflow: visible; }

    label        { font-size: 12px; font-weight: 500; color: #5f6368; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .3px; }
    label .req   { color: #d33427; margin-left: 2px; }

    input[type="text"], input[type="email"], select, textarea {
      padding: 10px 12px; border: 1px solid #dadce0; border-radius: 4px;
      font-size: 13px; font-family: inherit; transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: #4285f4; box-shadow: 0 0 0 3px rgba(66,133,244,.1);
    }
    textarea { resize: vertical; min-height: 100px; }

    /* ── Phone Input with Country Code ── */
    .phone-wrap { display: flex; gap: 8px; overflow: visible; }
    .cc-wrap { position: relative; flex: 0 0 80px; overflow: visible; }
    .cc-btn {
      width: 100%; padding: 8px 10px; border: 1px solid #dadce0; border-radius: 4px;
      font-size: 13px; background: #fff; color: #202124; cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 6px;
    }
    .cc-btn:hover { border-color: #4285f4; }
    .cc-btn img { width: 18px; height: 13px; object-fit: cover; border-radius: 2px; }
    .cc-btn .arrow { margin-left: auto; color: #5f6368; font-size: 8px; }
    .cc-menu {
      display: none; position: absolute; top: 100%; left: 0; 
      min-width: 200px; width: 200px; background: #fff;
      border: 1px solid #dadce0; border-radius: 4px;
      box-shadow: 0 4px 12px rgba(0,0,0,.15); z-index: 9999; max-height: 280px; overflow-y: auto;
    }
    .cc-menu.show { display: block; }
    .cc-search {
      position: sticky; top: 0; background: #fff; padding: 8px;
      border-bottom: 1px solid #e8eaed;
    }
    .cc-search input {
      width: 100%; padding: 8px 10px; border: 1px solid #dadce0; border-radius: 4px;
      font-size: 12px; box-sizing: border-box;
    }
    .cc-divider {
      padding: 6px 12px; font-size: 10px; font-weight: 600; color: #5f6368;
      background: #f8f9fa; text-transform: uppercase; letter-spacing: .5px;
      border-top: 1px solid #e8eaed; border-bottom: 1px solid #e8eaed;
    }
    .cc-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer;
      white-space: nowrap;
    }
    .cc-item:hover { background: #e8f0fe; }
    .cc-item img { width: 24px; height: 16px; object-fit: cover; border-radius: 2px; flex-shrink: 0; }
    .cc-item .name { flex: 1; font-size: 13px; color: #202124; overflow: hidden; text-overflow: ellipsis; }
    .cc-item .code { font-size: 12px; color: #5f6368; font-weight: 500; flex-shrink: 0; }
    .phone-input { flex: 1; }

    /* ── Product multi-select dropdown (removed — now using standard selects) ── */

    /* ── Buttons ── */
    .btn-group { display: flex; gap: 12px; margin-top: 24px; padding-top: 16px; border-top: 1px solid #e8eaed; }
    .btn       { flex: 1; padding: 10px 24px; border: none; border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; text-transform: uppercase; letter-spacing: .5px; }
    .btn-sub   { background: #1f73e6; color: #fff; }
    .btn-sub:hover { background: #1765cc; }
    .btn-sub:disabled { background: #ccc; cursor: not-allowed; }
    .btn-clr   { background: #f3f3f3; color: #202124; }
    .btn-clr:hover { background: #e8e8e8; }

    .error { color: #d33427; font-size: 12px; margin-top: 4px; display: none; }
    .error.show { display: block; }
    .loading { display: none; text-align: center; padding: 20px; color: #5f6368; font-size: 13px; }
    .loading.show { display: block; }
    .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid #e8eaed;
            border-top-color: #1f73e6; border-radius: 50%; animation: sp .6s linear infinite; margin-right: 8px; }
    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <form id="frm">
    <div class="form-section">
      <div class="section-title">Primary Details</div>

      <div class="form-row tri">
        <div class="form-group">
          <label>Name <span class="req">*</span></label>
          <input type="text" id="name" placeholder="Full name" />
          <div class="error" id="nameErr"></div>
        </div>
        <div class="form-group">
          <label>WhatsApp No <span class="req">*</span></label>
          <div class="phone-wrap">
            <div class="cc-wrap">
              <button type="button" class="cc-btn" id="ccBtn">
                <img id="ccFlag" src="https://flagcdn.com/w40/in.png" alt="flag" />
                <span id="ccCode">+91</span>
                <span class="arrow">▼</span>
              </button>
              <div class="cc-menu" id="ccMenu">
                <div class="cc-search">
                  <input type="text" id="ccSearch" placeholder="Search country..." />
                </div>
                <div id="ccList"></div>
              </div>
            </div>
            <input type="text" id="phone" class="phone-input" placeholder="Mobile number" />
          </div>
          <input type="hidden" id="countryCode" value="+91" />
          <div class="error" id="phoneErr"></div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Email address" />
        </div>
      </div>

      <div class="form-row tri">
        <div class="form-group">
          <label>Inquiry <span class="req">*</span></label>
          <select id="inquiry"><option value="">Select Inquiry</option></select>
          <div class="error" id="inquiryErr"></div>
        </div>
        <div class="form-group">
          <label>Product</label>
          <select id="product"><option value="">— Select Product (optional) —</option></select>
        </div>
        <div class="form-group">
          <label>Agent <span class="req">*</span></label>
          <select id="agent"><option value="">Select Agent</option></select>
          <div class="error" id="agentErr"></div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Source <span class="req">*</span></label>
          <select id="source"><option value="">Select Source</option></select>
          <div class="error" id="srcErr"></div>
        </div>
        <div class="form-group">
          <label>State</label>
          <input type="text" id="state" placeholder="State" />
        </div>
      </div>

      <div class="form-row full">
        <div class="form-group">
          <label>Remarks</label>
          <textarea id="remarks" placeholder="Additional remarks or notes..."></textarea>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="loading" id="loading"><span class="spin"></span> Submitting inquiry...</div>
      <div class="btn-group">
        <button type="submit" class="btn btn-sub" id="subBtn">➕ Add Inquiry</button>
        <button type="button" class="btn btn-clr" id="clrBtn">Clear</button>
      </div>
    </div>
  </form>

    document.addEventListener('DOMContentLoaded', function() {
      initCountryCodeDropdown();
      loadDropdownOptions();
    });

    /* ── Country Code Dropdown ── */
    function initCountryCodeDropdown() {
      var ccBtn   = document.getElementById('ccBtn');
      var ccMenu  = document.getElementById('ccMenu');
      var ccList  = document.getElementById('ccList');
      var ccSearch = document.getElementById('ccSearch');

      // Build dropdown list
      renderCountryList(ccList, '');

      // Toggle dropdown
      ccBtn.addEventListener('click', function(e) {
        e.preventDefault();
        ccMenu.classList.toggle('show');
        if (ccMenu.classList.contains('show')) {
          ccSearch.value = '';
          ccSearch.focus();
          renderCountryList(ccList, '');
        }
      });

      // Search filter
      ccSearch.addEventListener('input', function() {
        renderCountryList(ccList, this.value.toLowerCase());
      });

      // Close on outside click
      document.addEventListener('click', function(e) {
        if (!e.target.closest('.cc-wrap')) ccMenu.classList.remove('show');
      });

      // Prevent menu close when clicking search
      ccSearch.addEventListener('click', function(e) { e.stopPropagation(); });
    }

    function renderCountryList(container, filter) {
      container.innerHTML = '';

      // Filter function
      var matchesFilter = function(c) {
        if (!filter) return true;
        return c.name.toLowerCase().indexOf(filter) !== -1 || c.code.indexOf(filter) !== -1;
      };

      // Pinned section
      var pinnedFiltered = PINNED_COUNTRIES.filter(matchesFilter);
      if (pinnedFiltered.length > 0) {
        var divPinned = document.createElement('div');
        divPinned.className = 'cc-divider';
        divPinned.textContent = '★ Quick Access';
        container.appendChild(divPinned);
        pinnedFiltered.forEach(function(c) { container.appendChild(createCountryItem(c)); });
      }

      // All countries section
      var allFiltered = ALL_COUNTRIES.filter(matchesFilter);
      if (allFiltered.length > 0) {
        var divAll = document.createElement('div');
        divAll.className = 'cc-divider';
        divAll.textContent = 'All Countries';
        container.appendChild(divAll);
        allFiltered.forEach(function(c) { container.appendChild(createCountryItem(c)); });
      }
    }

    function createCountryItem(country) {
      var item = document.createElement('div');
      item.className = 'cc-item';
      item.innerHTML = '<img src="https://flagcdn.com/w40/' + country.iso + '.png" alt="' + country.name + '" />' +
                       '<span class="name">' + country.name + '</span>' +
                       '<span class="code">' + country.code + '</span>';
      item.addEventListener('click', function() { selectCountry(country); });
      return item;
    }

    function selectCountry(country) {
      document.getElementById('ccFlag').src = 'https://flagcdn.com/w40/' + country.iso + '.png';
      document.getElementById('ccCode').textContent = country.code;
      document.getElementById('countryCode').value = country.code;
      document.getElementById('ccMenu').classList.remove('show');
      document.getElementById('phone').focus();
    }

    function loadDropdownOptions() {
      google.script.run.withSuccessHandler(function(data) {
        // Agents
        var aSel = document.getElementById('agent');
        data.agents.forEach(function(a) {
          var o = document.createElement('option'); o.value = a; o.textContent = a; aSel.appendChild(o);
        });

        // Inquiries
        var iSel = document.getElementById('inquiry');
        data.inquiries.forEach(function(i) {
          var o = document.createElement('option'); o.value = i; o.textContent = i; iSel.appendChild(o);
        });

        // Products
        var pSel = document.getElementById('product');
        data.products.forEach(function(p) {
          var o = document.createElement('option'); o.value = p; o.textContent = p; pSel.appendChild(o);
        });

        // Sources
        var sSel = document.getElementById('source');
        data.sources.forEach(function(s) {
          var o = document.createElement('option'); o.value = s; o.textContent = s; sSel.appendChild(o);
        });
      }).getDropdownOptions();
    }

    /* ══════════════════════════════════════════════════════════════════
       FORM SUBMISSION
    ══════════════════════════════════════════════════════════════════ */
    document.getElementById('frm').addEventListener('submit', function(e) {
      e.preventDefault();
      if (!validate()) return;
      document.getElementById('loading').classList.add('show');
      document.getElementById('subBtn').disabled = true;

      var countryCode = document.getElementById('countryCode').value;
      var phoneNum = document.getElementById('phone').value.trim().replace(/\D/g, '');
      var fullPhone = countryCode + phoneNum;

      var fd = {
        name:     document.getElementById('name').value.trim(),
        phone:    fullPhone,
        email:    document.getElementById('email').value.trim(),
        state:    document.getElementById('state').value.trim(),
        agent:    document.getElementById('agent').value,
        inquiry:  document.getElementById('inquiry').value,
        product:  document.getElementById('product').value,
        source:   document.getElementById('source').value,
        remarks:  document.getElementById('remarks').value.trim()
      };

      google.script.run
        .withSuccessHandler(function(r) {
          document.getElementById('loading').classList.remove('show');
          document.getElementById('subBtn').disabled = false;
          if (r.success) {
            google.script.run.showSuccessToast('\u2705 Inquiry added!');
            resetForm();
          } else {
            google.script.run.showErrorToast('\u274C ' + r.message);
          }
        })
        .withFailureHandler(function(err) {
          document.getElementById('loading').classList.remove('show');
          document.getElementById('subBtn').disabled = false;
          google.script.run.showErrorToast('\u274C ' + err);
        })
        .submitInquiry(fd);
    });

    /* ── Clear Button ── */
    document.getElementById('clrBtn').addEventListener('click', function(e) {
      e.preventDefault();
      resetForm();
    });

    function resetForm() {
      document.getElementById('frm').reset();
      clrErr();
      // Reset to default country (India)
      document.getElementById('ccFlag').src = 'https://flagcdn.com/w40/in.png';
      document.getElementById('ccCode').textContent = '+91';
      document.getElementById('countryCode').value = '+91';
    }

    /* ══════════════════════════════════════════════════════════════════
       VALIDATION
    ══════════════════════════════════════════════════════════════════ */
    function validate() {
      clrErr();
      var ok = true;

      if (!document.getElementById('name').value.trim()) {
        showErr('nameErr', 'Name is required'); ok = false;
      }

      var ph = document.getElementById('phone').value.trim();
      if (!ph) {
        showErr('phoneErr', 'Phone is required'); ok = false;
      } else {
        var digits = ph.replace(/\D/g, '');
        if (digits.length < 7 || digits.length > 15) {
          showErr('phoneErr', 'Enter a valid phone number (7-15 digits)'); ok = false;
        }
      }

      if (!document.getElementById('agent').value) {
        showErr('agentErr', 'Agent is required'); ok = false;
      }

      if (!document.getElementById('inquiry').value) {
        showErr('inquiryErr', 'Inquiry is required'); ok = false;
      }

      if (!document.getElementById('source').value) {
        showErr('srcErr', 'Source is required'); ok = false;
      }

      return ok;
    }

    function showErr(id, msg) {
      var el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
    }

    function clrErr() {
      document.querySelectorAll('.error').forEach(function(el) {
        el.classList.remove('show');
        el.textContent = '';
      });
    }
  </script>
</body>
</html>
